<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="完全本地的 Codex token 活动热力图"
    />
    <title>Local Codex Activity</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div>
          <p class="eyebrow">LOCAL CODEX ACTIVITY</p>
          <h1>Token 活动</h1>
        </div>
        <button
          id="refresh-button"
          class="icon-button"
          type="button"
          title="刷新本地统计"
          aria-label="刷新本地统计"
        >
          ↻
        </button>
      </div>
    </header>

    <main>
      <section class="summary-section" aria-labelledby="summary-heading">
        <div class="section-heading">
          <div>
            <h2 id="summary-heading">过去 52 周</h2>
            <p id="status-text" class="muted">正在读取本地 Codex 会话日志…</p>
          </div>
          <div id="metric-switcher" class="segmented" aria-label="统计指标">
            <button type="button" data-metric="total_tokens" aria-pressed="true">
              总量
            </button>
            <button type="button" data-metric="input_tokens" aria-pressed="false">
              输入
            </button>
            <button type="button" data-metric="output_tokens" aria-pressed="false">
              输出
            </button>
            <button
              type="button"
              data-metric="cached_input_tokens"
              aria-pressed="false"
            >
              缓存输入
            </button>
          </div>
        </div>

        <div class="stats" aria-live="polite">
          <article class="stat">
            <span>Token 总量</span>
            <strong id="stat-total">—</strong>
          </article>
          <article class="stat">
            <span>单日峰值</span>
            <strong id="stat-peak">—</strong>
          </article>
          <article class="stat">
            <span>活跃天数</span>
            <strong id="stat-days">—</strong>
          </article>
          <article class="stat">
            <span>当前连续</span>
            <strong id="stat-streak">—</strong>
          </article>
        </div>
      </section>

      <section class="heatmap-section" aria-labelledby="heatmap-heading">
        <div class="heatmap-heading">
          <div>
            <h2 id="heatmap-heading">每日使用量</h2>
            <p class="muted">颜色强度相对于当前指标的单日峰值</p>
          </div>
          <div class="legend" aria-label="颜色图例">
            <span>少</span>
            <i data-level="0"></i>
            <i data-level="1"></i>
            <i data-level="2"></i>
            <i data-level="3"></i>
            <i data-level="4"></i>
            <span>多</span>
          </div>
        </div>

        <div id="heatmap-scroll" class="heatmap-scroll">
          <div class="heatmap-layout">
            <div class="weekday-labels" aria-hidden="true">
              <span></span>
              <span>一</span>
              <span></span>
              <span>三</span>
              <span></span>
              <span>五</span>
              <span></span>
            </div>
            <div>
              <div id="month-labels" class="month-labels" aria-hidden="true"></div>
              <div
                id="heatmap"
                class="heatmap"
                role="grid"
                aria-label="本地 Codex token 活动热力图"
                aria-busy="true"
              ></div>
            </div>
          </div>
        </div>

        <div id="empty-state" class="empty-state" hidden>
          没有找到可统计的本地 token 事件。
        </div>
      </section>

      <section class="coverage-section" aria-labelledby="coverage-heading">
        <h2 id="coverage-heading">本地数据覆盖</h2>
        <dl class="coverage-list">
          <div><dt>会话文件</dt><dd id="coverage-files">—</dd></div>
          <div><dt>Token 事件</dt><dd id="coverage-events">—</dd></div>
          <div><dt>损坏行</dt><dd id="coverage-malformed">—</dd></div>
          <div><dt>时区</dt><dd id="coverage-timezone">—</dd></div>
        </dl>
        <p class="privacy-note">
          数据仅从本机 <code>~/.codex/sessions</code> 读取；页面不会展示或上传会话内容。
        </p>
      </section>
    </main>

    <div id="tooltip" class="tooltip" role="tooltip" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
